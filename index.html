                                </div>
                                <div id="reply_content_${item.rowIndex}" class="text-gray-800 whitespace-pre-wrap leading-relaxed">${item.replyContent}</div>
                            </div>
                        </div>
                        
                        <div id="reply_edit_form_${item.rowIndex}" style="display: none;" class="mt-3 bg-white p-4 rounded border border-blue-200 shadow-inner">
                            <label class="block text-xs font-bold text-gray-700 mb-1">修改承辦人：</label>
                            <input type="text" id="handler_${item.rowIndex}" class="form-input text-sm mb-2 w-full md:w-1/3" value="${item.handler}">
                            <label class="block text-xs font-bold text-gray-700 mb-1">修改內容：</label>
                            <textarea id="reply_input_${item.rowIndex}" class="form-input mb-2 w-full" rows="3"></textarea>
                            <div class="flex gap-2 justify-end">
                                <button class="btn btn-sm btn-secondary" onclick="cancelEditReply(${item.rowIndex})">取消</button>
                                <button class="btn btn-sm btn-primary" onclick="submitReply(${item.rowIndex})">更新回覆</button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 未處理
                if (canReplyRole) {
                    actionHtml = `
                        <div class="mt-4 pt-4 border-t border-orange-100">
                            <div class="bg-orange-50 p-4 rounded-lg border border-orange-200">
                                <label class="block text-sm font-bold text-gray-800 mb-2 flex items-center">
                                    <span class="w-2 h-6 bg-orange-500 rounded mr-2"></span>
                                    回覆處理
                                </label>
                                <div class="flex flex-col md:flex-row gap-3 mb-3">
                                    <div class="w-full md:w-1/4">
                                        <input type="text" id="handler_${item.rowIndex}" class="form-input text-sm" placeholder="承辦人姓名">
                                    </div>
                                    <div class="w-full md:w-3/4">
                                         <textarea id="reply_input_${item.rowIndex}" class="form-input text-sm" placeholder="請輸入回覆內容..." rows="1"></textarea>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <button class="btn btn-sm btn-primary px-6" onclick="submitReply(${item.rowIndex})">送出回覆</button>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    actionHtml = `
                        <div class="mt-3 pt-2 text-center">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-orange-100 text-orange-800">
                                ⏳ 等待承辦人回覆中
                            </span>
                        </div>
                    `;
                }
            }

            // [修改重點] 版面重構：將時間與修改按鈕移至左側，緊接在標籤後方
            const html = `
                <div class="${cardClass} max-w-5xl mx-auto">
                    <div class="mb-4 pb-3 border-b border-gray-100">
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <span class="font-bold text-xl text-gray-800 mr-1">${item.name}</span>
                            <span class="px-2 py-0.5 text-xs rounded border ${item.source === '電話' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-purple-50 text-purple-600 border-purple-200'}">
                                ${item.source}
                            </span>
                            <span class="text-xs text-gray-400 font-mono ml-1 flex items-center">
                                ${item.timestamp}
                            </span>
                            ${editInquiryBtnHtml}
                        </div>
                        
                        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-sm text-gray-500">
                            <span class="flex items-center">📞 ${item.phone}</span>
                            <span class="text-gray-300">|</span>
                            <span class="flex items-center">👤 填單人: ${item.submitter}</span>

                    </div>
                    
                    <div class="flex items-start gap-3 mb-2 pl-1">
                        <div class="flex-shrink-0 mt-1">
                             <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-600 font-bold text-sm">問</span>
                        </div>
                        <div class="flex-grow">
                             <div class="font-medium text-gray-800 whitespace-pre-wrap leading-relaxed bg-gray-50 p-3 rounded border border-gray-100">${item.content}</div>

                    ${actionHtml}

            container.insertAdjacentHTML('beforeend', html);
        });
    }

    // 6. 送出回覆
    function submitReply(rowIndex) {
        const replyContent = document.getElementById(`reply_${rowIndex}`).value;
        // [新增] 取得承辦人
        const handlerName = document.getElementById(`handler_${rowIndex}`).value;

        if (!replyContent) {
            alert("請輸入回覆內容");
            return;
        }
        if (!handlerName) {
            alert("請輸入承辦人姓名");
            return;
        }

        if (!confirm("確定要送出回覆嗎？")) return;
        
        // 顯示按鈕 loading 狀態 (Optional UX improvement)
        const btn = event.target; // 取得點擊的按鈕
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "傳送中...";

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    alert("回覆成功");
                    handleInquirySearch(); // 重新整理列表
                } else {
                    alert(res.message);
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            })
            // [修改] 傳遞 handlerName
            .replyToReaderInquiry(localStorage.getItem(SESSION_STORAGE_KEY), rowIndex, replyContent, handlerName);
    }

    // 讀取後端通訊錄
// 我們會將此函式放在程式碼最後面執行，讓它在背景默默載入
function loadContactList() {
  console.log("正在背景載入通訊錄...");
  google.script.run.withSuccessHandler(function(contacts) {
    globalContactList = contacts;
    console.log("通訊錄已載入完成", Object.keys(contacts).length + " 個組別");
    
    // 如果資料回來時，表單已經打開了，嘗試即時更新下拉選單
    // 嘗試抓取可能存在的下拉選單 ID (假設前綴是 main)
    const groupSelect = document.getElementById('main_inviteeGroup');
    if (groupSelect && groupSelect.options.length <= 1) {
        let optionsHtml = '<option value="">選擇組別...</option>';
        Object.keys(contacts).forEach(group => {
            optionsHtml += `<option value="${group}">${group}</option>`;
        });
        groupSelect.innerHTML = optionsHtml;
    }
  }).getContactList();
}

// --- [新增] 邀請名單相關 UI 操作函式 ---

// 當選擇組別時，更新人員選單
function updatePersonOptions(prefix) {
    const groupSelect = document.getElementById(`${prefix}_inviteeGroup`);
    const personSelect = document.getElementById(`${prefix}_inviteePerson`);
    const selectedGroup = groupSelect.value;
    
    personSelect.innerHTML = '<option value="">選擇人員...</option>';
    
    if (selectedGroup && globalContactList[selectedGroup]) {
        globalContactList[selectedGroup].forEach(person => {
            const option = document.createElement('option');
            option.value = person.email;
            option.textContent = person.name;
            option.setAttribute('data-name', person.name); 
            personSelect.appendChild(option);
        });
    }
}

// 當選擇人員時，自動填入輸入框
function fillInviteeInputs(prefix) {
    const personSelect = document.getElementById(`${prefix}_inviteePerson`);
    const selectedOption = personSelect.options[personSelect.selectedIndex];
    
    if (selectedOption && selectedOption.value) {
        document.getElementById(`${prefix}_inviteeName`).value = selectedOption.getAttribute('data-name');
        document.getElementById(`${prefix}_inviteeEmail`).value = selectedOption.value;
    }
}

// 加入人員到列表
function addInvitee(prefix) {
    const nameInput = document.getElementById(`${prefix}_inviteeName`);
    const emailInput = document.getElementById(`${prefix}_inviteeEmail`);
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    
    if (!name || !email) {
        alert("請輸入姓名與 Email");
        return;
    }
    if (!email.includes('@')) {
        alert("Email 格式不正確");
        return;
    }

    const hiddenInput = document.getElementById(`${prefix}_invitees`);
    let currentList = [];
    try {
        currentList = JSON.parse(hiddenInput.value || '[]');
    } catch(e) { currentList = []; }

    if (currentList.some(p => p.email === email)) {
        alert("此 Email 已在名單中");
        return;
    }

    currentList.push({ name: name, email: email });
    hiddenInput.value = JSON.stringify(currentList);
    
    renderInviteeList(prefix, currentList);
    
    // 清空輸入框與重置選單
    nameInput.value = '';
    emailInput.value = '';
    const groupSelect = document.getElementById(`${prefix}_inviteeGroup`);
    const personSelect = document.getElementById(`${prefix}_inviteePerson`);
    if(groupSelect) groupSelect.value = '';
    if(personSelect) personSelect.innerHTML = '<option value="">選擇人員...</option>';
}

// 移除人員
function removeInvitee(prefix, index) {
    const hiddenInput = document.getElementById(`${prefix}_invitees`);
    let currentList = JSON.parse(hiddenInput.value || '[]');
    currentList.splice(index, 1);
    hiddenInput.value = JSON.stringify(currentList);
    renderInviteeList(prefix, currentList);
}

// 渲染名單畫面
function renderInviteeList(prefix, list) {
    const container = document.getElementById(`${prefix}_inviteeList`);
    if (!container) return;
    container.innerHTML = '';
    
    list.forEach((p, index) => {
        const chip = document.createElement('div');
        chip.className = 'flex items-center bg-blue-100 text-blue-800 text-sm px-2 py-1 rounded-full mr-2 mb-2 border border-blue-200';
        chip.innerHTML = `<span>${p.name}</span><button type="button" class="ml-2 text-blue-600 hover:text-red-600 font-bold" onclick="removeInvitee('${prefix}', ${index})">×</button>`;
        container.appendChild(chip);
    });
}
// --- [新增] 程式碼讀取完畢後，立即在背景載入通訊錄 ---
loadContactList();

// --- [新增] 修改提問 (Modal 操作) ---
    
    function openEditInquiryModal(encodedData) {
        const item = JSON.parse(decodeURIComponent(encodedData));
        
        document.getElementById('editRowIndex').value = item.rowIndex;
        document.getElementById('editInqSource').value = item.source;
        document.getElementById('editInqName').value = item.name;
        // 電話可能有單引號，顯示時要拿掉
        document.getElementById('editInqPhone').value = (item.phone || '').replace(/^'/, '');
        document.getElementById('editInqContent').value = item.content;
        
        document.getElementById('editInquiryModal').style.display = 'block';
    }

    function closeEditInquiryModal() {
        document.getElementById('editInquiryModal').style.display = 'none';
    }

    function submitInquiryEdit() {
        const rowIndex = document.getElementById('editRowIndex').value;
        const source = document.getElementById('editInqSource').value;
        const name = document.getElementById('editInqName').value;
        const phone = document.getElementById('editInqPhone').value;
        const content = document.getElementById('editInqContent').value;

        if (!name || !content) { alert("姓名與內容不可為空"); return; }

        const formData = { source, name, phone, content };
        const btn = document.querySelector('#editInquiryModal .btn-primary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "儲存中...";

        google.script.run
            .withSuccessHandler(res => {
                btn.disabled = false;
                btn.textContent = originalText;
                if (res.success) {
                    alert(res.message);
                    closeEditInquiryModal();
                    handleInquirySearch(); // 刷新列表
                } else {
                    alert(res.message);
                }
            })
            .editInquiryContent(localStorage.getItem(SESSION_STORAGE_KEY), rowIndex, formData);
    }

    // --- [新增] 修改回覆 (切換顯示模式) ---

    function enableEditReply(rowIndex) {
        // 隱藏顯示區，顯示編輯區
        document.getElementById(`reply_content_${rowIndex}`).style.display = 'none';
        
        // 將現有內容填入 textarea
        const currentContent = document.getElementById(`reply_content_${rowIndex}`).textContent;
        document.getElementById(`reply_input_${rowIndex}`).value = currentContent;
        
        document.getElementById(`reply_edit_form_${rowIndex}`).style.display = 'block';
    }

    function cancelEditReply(rowIndex) {
        document.getElementById(`reply_content_${rowIndex}`).style.display = 'block';
        document.getElementById(`reply_edit_form_${rowIndex}`).style.display = 'none';
    }

    // --- [修改] submitReply (需調整以支援 textarea id 的變化) ---
    function submitReply(rowIndex) {
        // [修正] ID 統一改為 reply_input_
        const replyInput = document.getElementById(`reply_input_${rowIndex}`); 
        const handlerInput = document.getElementById(`handler_${rowIndex}`);
        
        const replyContent = replyInput.value;
        const handlerName = handlerInput.value;

        if (!replyContent) { alert("請輸入回覆內容"); return; }
        if (!handlerName) { alert("請輸入承辦人姓名"); return; }

        if (!confirm("確定要更新/送出回覆嗎？")) return;
        
        // 顯示 Loading (如果是在編輯模式下的按鈕)
        const btn = event.target;
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "處理中...";

        google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    alert("操作成功");
                    handleInquirySearch();
                } else {
                    alert(res.message);
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            })
            .replyToReaderInquiry(localStorage.getItem(SESSION_STORAGE_KEY), rowIndex, replyContent, handlerName);
    }

  </script>
